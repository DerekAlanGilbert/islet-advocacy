<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,900&family=Outfit:wght@400;500&display=swap');
  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background: #17223B;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  /* Decorative elements */
  .circle1 {
    position: absolute;
    top: -80px;
    right: -60px;
    width: 300px;
    height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(196, 69, 54, 0.15), transparent);
  }
  .circle2 {
    position: absolute;
    bottom: -100px;
    left: -80px;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(196, 69, 54, 0.1), transparent);
  }
  .line {
    position: absolute;
    top: 40px;
    left: 60px;
    right: 60px;
    height: 1px;
    background: rgba(255,255,255,0.08);
  }
  .line-bottom {
    position: absolute;
    bottom: 40px;
    left: 60px;
    right: 60px;
    height: 1px;
    background: rgba(255,255,255,0.08);
  }
  .content {
    text-align: center;
    z-index: 1;
  }
  .title {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 72px;
    font-weight: 900;
    color: #FFFDF7;
    letter-spacing: -1px;
    margin-bottom: 16px;
  }
  .tagline {
    font-family: 'Outfit', sans-serif;
    font-size: 24px;
    font-weight: 400;
    color: rgba(255, 253, 247, 0.6);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 40px;
  }
  .accent-bar {
    width: 60px;
    height: 4px;
    background: linear-gradient(90deg, #C44536, #E06B4A);
    margin: 0 auto 40px;
    border-radius: 2px;
  }
  .url {
    font-family: 'Outfit', sans-serif;
    font-size: 18px;
    font-weight: 500;
    color: rgba(255, 253, 247, 0.35);
    letter-spacing: 2px;
  }
</style>
</head>
<body>
  <div class="circle1"></div>
  <div class="circle2"></div>
  <div class="line"></div>
  <div class="line-bottom"></div>
  <div class="content">
    <div class="title">Diabetic Collective</div>
    <div class="accent-bar"></div>
    <div class="tagline">Advocating for a cure. Together.</div>
    <div class="url">diabeticcollective.org</div>
  </div>
</body>
</html>
